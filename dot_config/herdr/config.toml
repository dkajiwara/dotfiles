onboarding = false

[theme]
name = "kanagawa"
[ui]
agent_panel_sort = "priority"

[ui.toast]
delivery = "terminal"
delay_seconds = 1

[ui.sidebar.spaces]
# 0.7.2+ はデフォルト 0 (詰め表示)。1 で以前の行間に戻る
row_gap = 1

[keys]
prefix = "ctrl+a"
split_horizontal = 'prefix+"'
split_vertical = 'prefix+%'
navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_up = "ctrl+k"
navigate_pane_down = "ctrl+j"
navigate_pane_left = "ctrl+h"
navigate_pane_right = "ctrl+l"

[[keys.command]]
key = "prefix+g"
type = "popup"
command = "lazygit"
description = "run lazygit"
width = "80%"
height = "80%"

[[keys.command]]
key = "prefix+t"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "open scratch terminal"
width = "80%"
height = "80%"
